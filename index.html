<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a1840" />
<title>Jarvis Poker — Video Poker</title>
<meta name="description" content="Old-school Jacks or Better video poker — the casino bar-top machine." />
<style>
  /* ====================================================================
     JARVIS POKER — a single-file, no-build video poker cabinet.
     Styled after the classic IGT "Game King" bar-top machine: royal-blue
     field, yellow paytable with a red max-bet column, court-card art, and
     a gold button rail. Single-file HTML, no build step.
     ==================================================================== */
  :root {
    --room: #050d24;          /* dark blue room behind the cabinet */
    --bezel: #d8a83e;          /* gold cabinet bezel */
    --bezel-2: #8a6014;
    --screen: #1a3fb0;         /* IGT royal-blue field */
    --screen-2: #102f8e;
    --pt-line: rgba(150,180,255,.45);
    --yellow: #ffd21a;         /* paytable / win / credits */
    --yellow-soft: #ffe680;
    --red: #d80f1f;            /* active bet column + jackpot */
    --red-2: #ff3242;
    --white: #f4f7ff;
    --card-red: #d4202a;
    --card-black: #16181f;
    --gold: #ffce3a;           /* buttons */
    --gold-2: #e09c00;
    --gold-ink: #3a2700;
    --muted: #aebbe6;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(130% 100% at 50% -10%, #14224e 0%, var(--room) 55%, #02060f 100%);
    color: var(--white);
    font-family: "Arial Narrow", "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 16px;
    overflow-x: hidden;
  }

  /* ---- Cabinet shell (gold bezel) ------------------------------------- */
  .cabinet {
    width: min(700px, 100%);
    background: linear-gradient(180deg, #f0c862 0%, var(--bezel) 22%, #9c7320 80%, #6f4f12 100%);
    border-radius: 20px;
    padding: 14px;
    box-shadow:
      0 0 0 3px #2a1d06,
      0 26px 60px rgba(0,0,0,.75),
      inset 0 2px 0 rgba(255,255,255,.5),
      inset 0 -3px 8px rgba(0,0,0,.35);
    position: relative;
  }

  /* Marquee topper */
  .topper {
    text-align: center;
    padding: 9px 8px;
    margin-bottom: 12px;
    background: linear-gradient(180deg, #12266a, #0a1840);
    border: 2px solid #f0c862;
    border-radius: 12px;
    box-shadow: inset 0 0 18px rgba(0,0,0,.6), 0 2px 4px rgba(0,0,0,.4);
    user-select: none;
  }
  .topper .title {
    font-weight: 900;
    font-size: clamp(26px, 6.6vw, 44px);
    letter-spacing: 5px;
    color: #fff;
    text-shadow: 0 0 1px #000, 2px 2px 0 var(--gold-2), -1px -1px 0 #0a1840, 0 0 16px rgba(255,210,26,.55);
  }
  .topper .sub {
    font-size: clamp(10px, 2.4vw, 13px);
    letter-spacing: 7px;
    color: var(--yellow);
    margin-top: 3px;
    font-weight: 800;
  }

  /* ---- Screen (royal-blue field) -------------------------------------- */
  .screen {
    position: relative;
    background: linear-gradient(180deg, var(--screen) 0%, var(--screen-2) 100%);
    border: 3px solid #0a1840;
    border-radius: 10px;
    padding: 12px;
    box-shadow: inset 0 0 60px rgba(0,0,0,.35), inset 0 0 0 2px rgba(120,160,255,.25);
    overflow: hidden;
  }
  .screen::after { /* subtle CRT scanlines + glass sheen */
    content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: 10px;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.07) 0 1px, transparent 1px 3px),
      linear-gradient(100deg, rgba(255,255,255,.06) 0%, transparent 28%);
  }

  /* ---- Paytable ------------------------------------------------------- */
  .paytable {
    border: 2px solid #6f93ff;
    border-radius: 5px;
    overflow: hidden;
    background: linear-gradient(180deg, #1c46bd, #11328f);
    font-variant-numeric: tabular-nums;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
  }
  .pt-row {
    display: grid;
    grid-template-columns: 2.1fr repeat(5, 1fr);
    border-bottom: 1px solid var(--pt-line);
  }
  .pt-row:last-child { border-bottom: 0; }
  .pt-row .name {
    display: flex; align-items: baseline; gap: 5px;
    font-weight: 800;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 3px 8px;
    font-size: clamp(8px, 2vw, 12px);
    white-space: nowrap;
    overflow: hidden;
  }
  .pt-row .name::after { /* dotted leader */
    content: ""; flex: 1; min-width: 8px;
    border-bottom: 2px dotted rgba(255,210,26,.55);
    transform: translateY(-2px);
  }
  .pt-row .amt {
    text-align: center;
    padding: 3px 2px;
    font-size: clamp(8px, 2vw, 12px);
    font-weight: 800;
    color: var(--yellow);
    border-left: 1px solid rgba(150,180,255,.2);
  }
  .pt-row .amt.col-hi { /* active bet column → red box */
    background: linear-gradient(180deg, var(--red-2), var(--red));
    color: #fff;
    text-shadow: 0 1px 1px rgba(0,0,0,.5);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.2);
  }
  .pt-row.win-row { background: rgba(255,255,255,.08); }
  .pt-row.win-row .name, .pt-row.win-row .amt { animation: rowpulse .5s ease-in-out infinite alternate; }
  @keyframes rowpulse { from{filter:none} to{filter:brightness(1.55)} }

  /* ---- Message line --------------------------------------------------- */
  .message {
    text-align: center;
    height: 24px;
    line-height: 24px;
    margin: 9px 0 5px;
    font-weight: 900;
    letter-spacing: 2px;
    font-size: clamp(13px, 3.2vw, 19px);
    color: #fff;
    text-shadow: 0 0 8px rgba(120,170,255,.7), 0 1px 1px rgba(0,0,0,.6);
    text-transform: uppercase;
  }
  .message.blink { animation: blink 1s steps(2,start) infinite; }
  .message.win  { color: var(--yellow-soft); text-shadow: 0 0 14px var(--yellow); }
  .message.lose { color: #ff6a6a; text-shadow: 0 0 10px #ff2d2d; }
  @keyframes blink { 50% { opacity: .3; } }

  /* ---- Cards ---------------------------------------------------------- */
  .hand {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: clamp(5px, 1.6vw, 11px);
    margin: 4px 0 10px;
  }
  .slot { display: flex; flex-direction: column; align-items: center; gap: 5px; }

  .held-lamp {
    font-size: clamp(9px, 2.2vw, 12px);
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    background: linear-gradient(180deg, #2a52c8, #0e2470);
    border: 1px solid #8fb0ff;
    border-radius: 3px;
    padding: 1px 9px;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity .12s, transform .12s;
    box-shadow: 0 0 9px rgba(130,170,255,.7);
  }
  .slot.held .held-lamp { opacity: 1; transform: none; }

  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 7;
    cursor: pointer;
    perspective: 800px;
    border: 0; background: none; padding: 0;
  }
  .card .inner {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    transition: transform .35s cubic-bezier(.4,1.3,.5,1);
  }
  .card.face-down .inner { transform: rotateY(180deg); }
  .card .face, .card .back {
    position: absolute; inset: 0;
    border-radius: 7px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 3px 7px rgba(0,0,0,.5);
    overflow: hidden;
  }
  .card .face {
    background: linear-gradient(165deg, #fff, #eef0f6);
    border: 1px solid #c9cede;
    color: var(--card-black);
  }
  .card.red .face { color: var(--card-red); }

  /* corner index: rank over suit */
  .card .idx {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    font-weight: 900; line-height: .82;
    font-size: clamp(11px, 3.1vw, 17px);
  }
  .card .idx i { font-style: normal; font-size: .92em; margin-top: 1px; }
  .card .idx.tl { top: 5%; left: 7%; }
  .card .idx.br { bottom: 5%; right: 7%; transform: rotate(180deg); }

  /* pip grid for number cards */
  .card .center { position: absolute; inset: 12% 18%; }
  .card .center .pip {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: clamp(10px, 2.9vw, 17px);
    line-height: 1;
  }
  .card .center .pip.ace {
    left: 50%; top: 50%;
    font-size: clamp(30px, 9vw, 52px);
  }

  /* court cards (J/Q/K) */
  .card .court {
    position: absolute; inset: 13% 15%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3%;
    border: 2px solid currentColor;
    border-radius: 6px;
    background: linear-gradient(160deg, rgba(0,0,0,.05), rgba(0,0,0,0));
  }
  .card .court .crown { width: 52%; height: auto; fill: currentColor; opacity: .92; }
  .card .court .court-letter { font-weight: 900; font-size: clamp(20px, 6.2vw, 34px); line-height: 1; }
  .card .court .court-suit { font-size: clamp(15px, 4.2vw, 24px); line-height: 1; }

  .card .back {
    transform: rotateY(180deg);
    background:
      repeating-linear-gradient(45deg, #1f57c4 0 8px, #1a4093 8px 16px),
      #1f57c4;
    border: 1px solid #0a1840;
  }
  .card .back::after {
    content: ""; position: absolute; inset: 6px; border-radius: 4px;
    border: 2px solid rgba(255,255,255,.55);
    background: repeating-linear-gradient(-45deg, rgba(255,255,255,.14) 0 6px, transparent 6px 12px);
  }
  .slot.held .card .face { box-shadow: 0 0 0 3px var(--yellow), 0 3px 7px rgba(0,0,0,.5); }
  .card.dealing .inner { animation: dealin .35s ease; }
  @keyframes dealin { from { transform: translateY(-40px) rotateZ(-8deg); opacity: 0; } }
  .card.win-card .face { animation: cardglow .55s ease-in-out infinite alternate; }
  @keyframes cardglow { to { box-shadow: 0 0 0 3px var(--yellow), 0 0 20px var(--yellow); } }

  /* ---- Status bar: WIN · BET oval · CREDITS --------------------------- */
  .status {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding-top: 8px;
    border-top: 2px solid rgba(150,180,255,.3);
  }
  .stat { font-weight: 900; color: var(--yellow); text-transform: uppercase; line-height: 1; }
  .stat .lbl { display: block; font-size: 9px; letter-spacing: 2px; opacity: .85; margin-bottom: 2px; }
  .stat .val {
    font-size: clamp(18px, 5vw, 28px);
    text-shadow: 0 0 8px rgba(255,210,26,.45);
  }
  .stat.credits { text-align: right; }
  .bet-oval {
    display: flex; flex-direction: column; align-items: center;
    padding: 5px 22px; border-radius: 999px;
    background: radial-gradient(120% 150% at 50% 18%, #fff0b8, var(--gold) 48%, var(--gold-2));
    color: var(--gold-ink); font-weight: 900;
    border: 2px solid #9c6f12;
    box-shadow: 0 2px 6px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.7);
  }
  .bet-oval .lbl { font-size: 9px; letter-spacing: 2px; }
  .bet-oval .val { font-size: clamp(18px, 5vw, 26px); line-height: 1; }

  /* ---- Button rail (gold) --------------------------------------------- */
  .deck {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    border: 1px solid #9c6f12;
    border-radius: 7px;
    padding: 12px 6px;
    font-weight: 900;
    font-size: clamp(11px, 2.6vw, 14px);
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--gold-ink);
    cursor: pointer;
    position: relative;
    background: linear-gradient(180deg, #ffe680, var(--gold) 45%, var(--gold-2));
    box-shadow: 0 4px 0 #7a5410, inset 0 1px 0 rgba(255,255,255,.7);
    transition: transform .05s, box-shadow .05s, filter .15s;
    user-select: none;
    line-height: 1.15;
  }
  .btn small { display: block; font-size: 8px; letter-spacing: 1px; opacity: .75; font-weight: 800; }
  .btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #7a5410, inset 0 1px 0 rgba(255,255,255,.7); }
  .btn:disabled { filter: grayscale(.6) brightness(.72); cursor: not-allowed; }
  .btn.deal   { background: linear-gradient(180deg, #ff7a6a, #d8202a 55%, #9c0e16); color: #fff; border-color: #7a0a10; box-shadow: 0 4px 0 #6a0a10, inset 0 1px 0 rgba(255,255,255,.4); }
  .btn.double { background: linear-gradient(180deg, #ffd083, #ff8c1a 50%, #d9690a); }
  .btn.take   { background: linear-gradient(180deg, #bfe7ff, #4aa3ff 50%, #1f6fd8); color: #03203f; border-color: #14508f; box-shadow: 0 4px 0 #134a85, inset 0 1px 0 rgba(255,255,255,.5); }
  .btn.glow { animation: btnglow .8s ease-in-out infinite alternate; }
  @keyframes btnglow { to { filter: brightness(1.22); } }
  .hidden { display: none !important; }

  /* ---- Chrome: mute, stats, footer ------------------------------------ */
  .topbar { position: absolute; top: 22px; right: 24px; display: flex; gap: 8px; z-index: 5; }
  .icon-btn {
    background: rgba(8,18,48,.6); border: 1px solid #d8a83e; color: var(--yellow);
    border-radius: 7px; width: 34px; height: 30px; cursor: pointer; font-size: 15px;
  }
  .icon-btn:hover { filter: brightness(1.2); }

  .railnote {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; font-size: 10px; letter-spacing: 1px; color: var(--muted);
  }
  .railnote b { color: var(--yellow); font-weight: 800; }
  .footer { text-align: center; margin-top: 6px; font-size: 10px; color: #6f6a4a; letter-spacing: 1px; }
  .footer a { color: #b89a4a; text-decoration: none; }

  @media (max-width: 430px) {
    body { padding: 8px; }
    .cabinet { padding: 10px; border-radius: 14px; }
    .topbar { top: 16px; right: 16px; }
    .deck { gap: 6px; }
  }
</style>
</head>
<body>
  <main class="cabinet" role="application" aria-label="Jarvis Poker video poker machine">
    <div class="topbar">
      <button class="icon-btn" id="muteBtn" title="Mute / unmute (M)" aria-label="Toggle sound">🔊</button>
    </div>

    <div class="topper">
      <div class="title">JARVIS POKER</div>
      <div class="sub">JACKS OR BETTER</div>
    </div>

    <section class="screen">
      <div class="paytable" id="paytable" aria-label="Paytable"></div>
      <div class="message blink" id="message">INSERT COIN &nbsp;•&nbsp; PRESS DEAL</div>
      <div class="hand" id="hand" aria-label="Your hand"></div>
      <div class="status">
        <div class="stat win"><span class="lbl">WIN</span><span class="val" id="mWin">0</span></div>
        <div class="bet-oval"><span class="lbl">BET</span><span class="val" id="mBet">1</span></div>
        <div class="stat credits"><span class="lbl">CREDITS</span><span class="val" id="mCredits">0</span></div>
      </div>
    </section>

    <div class="deck">
      <button class="btn bet"  id="betBtn">Bet Up<small>+1 / wrap</small></button>
      <button class="btn max"  id="maxBtn">Bet Max<small>5 &amp; deal</small></button>
      <button class="btn cash" id="cashBtn">Cash Out<small>collect</small></button>
      <button class="btn deal" id="dealBtn">Deal<small>new hand</small></button>

      <button class="btn take   hidden" id="takeBtn">Take Win<small>collect</small></button>
      <button class="btn double hidden" id="doubleBtn">Double Up<small>gamble</small></button>
    </div>

    <div class="railnote">
      <span>JACKS OR BETTER</span>
      <span>HANDS <b id="sHands">0</b> &nbsp; BIGGEST WIN <b id="sBig">0</b></span>
    </div>
    <div class="footer">Jarvis Poker · <span id="ver">v0.2</span> · <a href="https://poker.dabrewer.dev/" target="_blank" rel="noopener">poker.dabrewer.dev</a></div>
  </main>

<script>
"use strict";
/* =======================================================================
   JARVIS POKER — game logic (vanilla, no framework)
   ======================================================================= */
(function () {
  const VERSION = "v0.2";
  const SAVE_KEY = "jarvisPoker.v1";
  const START_CREDITS = 100;
  const INSERT_AMOUNT = 100;
  const DOUBLE_CAP = 5000;          // can't gamble a pot above this

  // --- Cards ------------------------------------------------------------
  // rank: 2..14 (11=J,12=Q,13=K,14=A) · suit: 0=♠ 1=♥ 2=♦ 3=♣
  const SUITS = ["♠", "♥", "♦", "♣"];
  const RED_SUITS = new Set([1, 2]);
  const RANK_LABEL = { 11: "J", 12: "Q", 13: "K", 14: "A" };
  const rankLabel = (r) => RANK_LABEL[r] || String(r);

  // Authentic pip layouts ([x%, y%] within the card's center box; pips in the
  // bottom half (y>50) are rotated 180°, just like a real deck).
  const PIPS = {
    2: [[50,14],[50,86]],
    3: [[50,14],[50,50],[50,86]],
    4: [[26,14],[74,14],[26,86],[74,86]],
    5: [[26,14],[74,14],[50,50],[26,86],[74,86]],
    6: [[26,14],[74,14],[26,50],[74,50],[26,86],[74,86]],
    7: [[26,14],[74,14],[50,32],[26,50],[74,50],[26,86],[74,86]],
    8: [[26,14],[74,14],[50,32],[26,50],[74,50],[50,68],[26,86],[74,86]],
    9: [[26,14],[74,14],[26,39],[74,39],[50,50],[26,61],[74,61],[26,86],[74,86]],
    10: [[26,14],[74,14],[50,27],[26,40],[74,40],[26,60],[74,60],[50,73],[26,86],[74,86]],
  };

  function freshDeck() {
    const d = [];
    for (let s = 0; s < 4; s++) for (let r = 2; r <= 14; r++) d.push({ r, s });
    // Fisher-Yates
    for (let i = d.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [d[i], d[j]] = [d[j], d[i]];
    }
    return d;
  }

  // --- Paytable (9/6 Jacks or Better), per-coin × bet -------------------
  // royal has the classic max-bet (5-coin) jackpot bump.
  const HANDS = [
    { key: "royal",    label: "Royal Flush",     pay: [250, 500, 750, 1000, 4000] },
    { key: "sflush",   label: "Straight Flush",  pay: [50, 100, 150, 200, 250] },
    { key: "quads",    label: "Four of a Kind",  pay: [25, 50, 75, 100, 125] },
    { key: "full",     label: "Full House",      pay: [9, 18, 27, 36, 45] },
    { key: "flush",    label: "Flush",           pay: [6, 12, 18, 24, 30] },
    { key: "straight", label: "Straight",        pay: [4, 8, 12, 16, 20] },
    { key: "trips",    label: "Three of a Kind", pay: [3, 6, 9, 12, 15] },
    { key: "twopair",  label: "Two Pair",        pay: [2, 4, 6, 8, 10] },
    { key: "jacks",    label: "Jacks or Better", pay: [1, 2, 3, 4, 5] },
  ];
  const PAY = Object.fromEntries(HANDS.map((h) => [h.key, h.pay]));

  /** Evaluate 5 cards → winning hand key or null. */
  function evaluate(cards) {
    const ranks = cards.map((c) => c.r).sort((a, b) => a - b);
    const suits = cards.map((c) => c.s);
    const flush = suits.every((s) => s === suits[0]);

    // straight: 5 distinct consecutive ranks (Ace high) OR the wheel A-2-3-4-5
    const uniq = [...new Set(ranks)];
    let straight = false, hi = 0;
    if (uniq.length === 5) {
      if (ranks[4] - ranks[0] === 4) { straight = true; hi = ranks[4]; }
      else if (ranks.join() === "2,3,4,5,14") { straight = true; hi = 5; } // wheel
    }

    if (straight && flush) return hi === 14 ? "royal" : "sflush";

    // rank multiplicities
    const counts = {};
    for (const r of ranks) counts[r] = (counts[r] || 0) + 1;
    const groups = Object.entries(counts)
      .map(([r, n]) => ({ r: +r, n }))
      .sort((a, b) => b.n - a.n || b.r - a.r);

    if (groups[0].n === 4) return "quads";
    if (groups[0].n === 3 && groups[1].n === 2) return "full";
    if (flush) return "flush";
    if (straight) return "straight";
    if (groups[0].n === 3) return "trips";
    if (groups[0].n === 2 && groups[1].n === 2) return "twopair";
    if (groups[0].n === 2 && groups[0].r >= 11) return "jacks"; // pair of J,Q,K,A
    return null;
  }

  const payoutFor = (key, bet) => (key ? PAY[key][bet - 1] : 0);

  // --- State ------------------------------------------------------------
  const S = {
    credits: START_CREDITS,
    bet: 1,
    win: 0,             // pending winnings (collectable / gamble-able)
    phase: "ready",     // ready | dealt | result | double
    hand: [],           // 5 cards
    held: [false, false, false, false, false],
    deck: [],
    evalKey: null,
    // double-up
    dealerCard: null,
    dblCards: [],       // 4 face-down candidates
    dblPicked: -1,
    muted: false,
    hands: 0,
    biggestWin: 0,
  };

  // --- DOM refs ---------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const el = {
    paytable: $("paytable"), message: $("message"), hand: $("hand"),
    mCredits: $("mCredits"), mBet: $("mBet"), mWin: $("mWin"),
    betBtn: $("betBtn"), maxBtn: $("maxBtn"), cashBtn: $("cashBtn"), dealBtn: $("dealBtn"),
    takeBtn: $("takeBtn"), doubleBtn: $("doubleBtn"),
    muteBtn: $("muteBtn"), sHands: $("sHands"), sBig: $("sBig"), ver: $("ver"),
  };

  // --- Audio (synthesized, Web Audio API) -------------------------------
  let actx = null;
  function ac() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { /* no audio */ } }
    if (actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(freq, dur, type = "square", gain = 0.12, when = 0) {
    if (S.muted) return;
    const c = ac(); if (!c) return;
    const t = c.currentTime + when;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, gain = 0.08) {
    if (S.muted) return;
    const c = ac(); if (!c) return;
    const t = c.currentTime;
    const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = c.createBufferSource(); src.buffer = buf;
    const g = c.createGain(); g.gain.value = gain;
    const f = c.createBiquadFilter(); f.type = "highpass"; f.frequency.value = 1200;
    src.connect(f).connect(g).connect(c.destination); src.start(t);
  }
  const sfx = {
    coin:   () => { tone(880, .07, "square", .1); tone(1320, .09, "square", .1, .06); },
    deal:   () => tone(420, .05, "triangle", .08),
    hold:   () => tone(640, .04, "square", .09),
    draw:   () => noise(.18, .07),
    lose:   () => { tone(300, .18, "sawtooth", .1); tone(180, .28, "sawtooth", .1, .1); },
    win:    (tier) => {
      const base = [523, 659, 784, 1047];           // C E G C
      const n = Math.min(4, 1 + tier);
      for (let i = 0; i < n + 1; i++) tone(base[Math.min(i, 3)] + (tier > 3 ? i * 40 : 0), .12, "square", .11, i * 0.09);
    },
    dbl:    (lvl) => { for (let i = 0; i < 4; i++) tone(440 + lvl * 60 + i * 120, .08, "square", .1, i * .05); },
  };

  // --- Persistence ------------------------------------------------------
  function save() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        credits: S.credits, bet: S.bet, hands: S.hands, biggestWin: S.biggestWin, muted: S.muted,
      }));
    } catch (e) { /* private mode — ignore */ }
  }
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (Number.isFinite(d.credits)) S.credits = d.credits;
      if (d.bet >= 1 && d.bet <= 5) S.bet = d.bet;
      if (Number.isFinite(d.hands)) S.hands = d.hands;
      if (Number.isFinite(d.biggestWin)) S.biggestWin = d.biggestWin;
      S.muted = !!d.muted;
    } catch (e) { /* ignore */ }
  }

  // --- Rendering --------------------------------------------------------
  function buildPaytable() {
    el.paytable.innerHTML = "";
    for (const h of HANDS) {
      const row = document.createElement("div");
      row.className = "pt-row";
      row.dataset.key = h.key;
      const name = document.createElement("div");
      name.className = "name";
      name.innerHTML = `<span>${h.label}</span>`;
      row.appendChild(name);
      for (let b = 0; b < 5; b++) {
        const amt = document.createElement("div");
        amt.className = "amt";
        amt.dataset.col = b + 1;
        amt.textContent = h.pay[b];
        row.appendChild(amt);
      }
      el.paytable.appendChild(row);
    }
  }
  function highlightPaytable() {
    el.paytable.querySelectorAll(".amt").forEach((a) => {
      a.classList.toggle("col-hi", +a.dataset.col === S.bet);
    });
    el.paytable.querySelectorAll(".pt-row").forEach((r) => {
      r.classList.toggle("win-row", S.evalKey && r.dataset.key === S.evalKey);
    });
  }

  const CROWN = '<svg class="crown" viewBox="0 0 26 16" aria-hidden="true"><path d="M2 14.5 L4 4 L9 9 L13 2 L17 9 L22 4 L24 14.5 Z"/></svg>';

  // Center art: ace = one big pip; 2-10 = pip grid; J/Q/K = framed court card.
  function centerMarkup(card) {
    const sym = SUITS[card.s];
    if (card.r >= 11 && card.r <= 13) {
      return `<div class="court">${CROWN}<span class="court-letter">${rankLabel(card.r)}</span><span class="court-suit">${sym}</span></div>`;
    }
    if (card.r === 14) {
      return `<div class="center"><span class="pip ace">${sym}</span></div>`;
    }
    const pips = PIPS[card.r].map(([x, y]) => {
      const rot = y > 50 ? " rotate(180deg)" : "";
      return `<span class="pip" style="left:${x}%;top:${y}%;transform:translate(-50%,-50%)${rot}">${sym}</span>`;
    }).join("");
    return `<div class="center">${pips}</div>`;
  }

  function cardFace(card) {
    const sym = SUITS[card.s], lab = rankLabel(card.r);
    return `
      <div class="inner">
        <div class="face">
          <span class="idx tl">${lab}<i>${sym}</i></span>
          ${centerMarkup(card)}
          <span class="idx br">${lab}<i>${sym}</i></span>
        </div>
        <div class="back"></div>
      </div>`;
  }

  function buildHand() {
    el.hand.innerHTML = "";
    for (let i = 0; i < 5; i++) {
      const slot = document.createElement("div");
      slot.className = "slot";
      slot.innerHTML = `<div class="held-lamp">HELD</div><button class="card face-down" data-i="${i}" aria-label="card ${i + 1}"><div class="inner"><div class="face"></div><div class="back"></div></div></button>`;
      el.hand.appendChild(slot);
    }
  }

  function renderHand(opts = {}) {
    const slots = el.hand.querySelectorAll(".slot");
    S.hand.forEach((card, i) => {
      const slot = slots[i];
      const btn = slot.querySelector(".card");
      const red = RED_SUITS.has(card.s);
      if (opts.faceUp !== false) {
        btn.innerHTML = cardFace(card);
        btn.classList.toggle("red", red);
        btn.classList.remove("face-down");
      }
      slot.classList.toggle("held", S.held[i]);
      btn.classList.toggle("win-card", !!opts.winCards && !!S.evalKey);
      if (opts.dealAnim && !S.held[i]) {
        btn.classList.remove("dealing");
        void btn.offsetWidth; // reflow so the animation restarts
        const inner = btn.querySelector(".inner");
        if (inner) inner.style.animationDelay = `${i * 60}ms`;
        btn.classList.add("dealing");
      }
    });
  }

  function updateMeters() {
    el.mCredits.textContent = S.credits;
    el.mBet.textContent = S.bet;
    el.mWin.textContent = S.win;
    el.sHands.textContent = S.hands;
    el.sBig.textContent = S.biggestWin;
  }

  function setMessage(text, cls = "") {
    el.message.className = "message " + cls;
    el.message.innerHTML = text;
  }

  // Show/enable the right buttons for the current phase.
  function refreshControls() {
    const ready = S.phase === "ready";
    const dealt = S.phase === "dealt";
    const result = S.phase === "result";
    const dbl = S.phase === "double";
    const broke = S.credits < 1 && S.win < 1;

    // Bet / Max only when ready (and not broke)
    el.betBtn.disabled = !ready || broke;
    el.maxBtn.disabled = !ready || S.credits < 1;
    // Cash out: collect bank when idle with credits
    el.cashBtn.disabled = !ready || S.credits < 1;

    // Deal button doubles as DRAW while cards are out
    el.dealBtn.classList.remove("hidden");
    if (dealt) {
      el.dealBtn.firstChild.nodeValue = "Draw";
      el.dealBtn.querySelector("small").textContent = "replace";
      el.dealBtn.disabled = false;
      el.dealBtn.classList.add("glow");
    } else if (ready) {
      el.dealBtn.firstChild.nodeValue = broke ? "Insert" : "Deal";
      el.dealBtn.disabled = false;
      el.dealBtn.classList.toggle("glow", !broke);
      el.dealBtn.querySelector("small").textContent = broke ? `+${INSERT_AMOUNT}` : "new hand";
    } else {
      el.dealBtn.disabled = true;
      el.dealBtn.classList.remove("glow");
    }

    // Take / Double appear on a win (result) or mid-gamble (double)
    const showGamble = result || dbl;
    el.takeBtn.classList.toggle("hidden", !showGamble);
    el.doubleBtn.classList.toggle("hidden", !(result));
    el.takeBtn.disabled = !showGamble;
    el.doubleBtn.disabled = !result || S.win > DOUBLE_CAP;
    el.takeBtn.classList.toggle("glow", result);

    // hide bet/max/cash/deal cluster visual emphasis during gamble
    el.dealBtn.classList.toggle("hidden", showGamble);
    el.betBtn.classList.toggle("hidden", showGamble);
    el.maxBtn.classList.toggle("hidden", showGamble);
    el.cashBtn.classList.toggle("hidden", showGamble);
  }

  // --- Actions ----------------------------------------------------------
  function setBet(b) {
    if (S.phase !== "ready") return;
    S.bet = Math.max(1, Math.min(5, b));
    sfx.coin();
    highlightPaytable(); updateMeters(); refreshControls(); save();
  }

  function deal() {
    if (S.phase === "dealt") return draw();
    if (S.phase !== "ready") return;

    if (S.credits < 1) { insertCoin(); return; }   // broke → Deal acts as Insert
    const bet = Math.min(S.bet, S.credits);
    S.bet = bet;
    S.credits -= bet;
    S.win = 0;
    S.evalKey = null;
    S.deck = freshDeck();
    S.hand = S.deck.splice(0, 5);
    S.held = [false, false, false, false, false];
    S.phase = "dealt";
    S.hands++;

    highlightPaytable();
    renderHand({ faceUp: true, dealAnim: true });
    sfx.deal();
    setMessage("HOLD CARDS &nbsp;•&nbsp; THEN DRAW", "blink");
    updateMeters(); refreshControls(); save();
  }

  function toggleHold(i) {
    if (S.phase !== "dealt") return;
    S.held[i] = !S.held[i];
    sfx.hold();
    renderHand({ faceUp: true });
  }

  function draw() {
    if (S.phase !== "dealt") return;
    // replace non-held cards
    let replaced = 0;
    for (let i = 0; i < 5; i++) {
      if (!S.held[i]) { S.hand[i] = S.deck.shift(); replaced++; }
    }
    sfx.draw();
    S.evalKey = evaluate(S.hand);
    const payout = payoutFor(S.evalKey, S.bet);
    renderHand({ faceUp: true, dealAnim: replaced > 0, winCards: payout > 0 });
    highlightPaytable();

    if (payout > 0) {
      S.win = payout;
      S.phase = "result";
      const label = HANDS.find((h) => h.key === S.evalKey).label;
      const tier = HANDS.findIndex((h) => h.key === S.evalKey); // 0=royal..8=jacks
      sfx.win(8 - tier);
      setMessage(`${label.toUpperCase()} &nbsp;—&nbsp; WIN ${payout}`, "win");
      if (payout > S.biggestWin) S.biggestWin = payout;
    } else {
      S.win = 0;
      S.phase = "ready";
      sfx.lose();
      setMessage("GAME OVER", "lose blink");
    }
    updateMeters(); refreshControls(); save();
  }

  function takeWin() {
    if (S.win < 1) return;
    S.credits += S.win;
    sfx.coin();
    S.win = 0;
    S.evalKey = null;
    S.phase = "ready";
    highlightPaytable();
    renderHand({ faceUp: true });
    setMessage("GOOD LUCK!", "blink");
    updateMeters(); refreshControls(); save();
  }

  // --- Double-Up (gamble) ----------------------------------------------
  function startDouble() {
    if (S.phase !== "result" || S.win < 1 || S.win > DOUBLE_CAP) return;
    S.phase = "double";
    S.evalKey = null;
    highlightPaytable();
    const deck = freshDeck();
    S.dealerCard = deck.shift();
    S.dblCards = deck.slice(0, 4);
    S.dblPicked = -1;

    // dealer card shown in slot 0 face-up; slots 1-4 are the face-down picks
    S.hand = [S.dealerCard, ...S.dblCards];
    S.held = [false, false, false, false, false];
    const slots = el.hand.querySelectorAll(".slot");
    slots.forEach((slot, i) => {
      const btn = slot.querySelector(".card");
      slot.classList.remove("held");
      btn.classList.remove("win-card");
      if (i === 0) {
        const red = RED_SUITS.has(S.dealerCard.s);
        btn.innerHTML = cardFace(S.dealerCard);
        btn.classList.toggle("red", red);
        btn.classList.remove("face-down");
      } else {
        btn.innerHTML = `<div class="inner"><div class="face"></div><div class="back"></div></div>`;
        btn.classList.add("face-down");
        btn.classList.remove("red");
      }
    });
    sfx.dbl(0);
    setMessage(`DOUBLE UP — BEAT DEALER'S ${rankLabel(S.dealerCard.r)}`, "blink");
    refreshControls();
  }

  function pickDouble(slotIndex) {
    if (S.phase !== "double" || slotIndex < 1 || S.dblPicked !== -1) return;
    S.dblPicked = slotIndex;
    const pick = S.dblCards[slotIndex - 1];
    const slots = el.hand.querySelectorAll(".slot");
    const btn = slots[slotIndex].querySelector(".card");
    btn.innerHTML = cardFace(pick);
    btn.classList.toggle("red", RED_SUITS.has(pick.s));
    btn.classList.remove("face-down");

    if (pick.r > S.dealerCard.r) {
      S.win *= 2;
      if (S.win > S.biggestWin) S.biggestWin = S.win;
      S.phase = "result";
      S.dblPicked = -1;
      btn.classList.add("win-card");
      sfx.win(2);
      setMessage(`YOU WIN ${S.win}! &nbsp;—&nbsp; TAKE OR DOUBLE`, "win");
    } else if (pick.r === S.dealerCard.r) {
      // push — replay the round at the same stake
      sfx.dbl(1);
      setMessage("TIE — PICK AGAIN", "blink");
      setTimeout(startDouble, 850);
    } else {
      S.win = 0;
      S.phase = "ready";
      sfx.lose();
      setMessage("DEALER WINS — GAME OVER", "lose blink");
    }
    updateMeters(); refreshControls(); save();
  }

  function cashOut() {
    if (S.phase !== "ready" || S.credits < 1) return;
    sfx.coin();
    const n = S.credits;
    setMessage(`CASHED OUT ${n} CREDITS`, "win blink");
    // little count-down to zero
    let c = S.credits;
    const step = Math.max(1, Math.round(c / 18));
    const t = setInterval(() => {
      c = Math.max(0, c - step);
      el.mCredits.textContent = c;
      if (c <= 0) { clearInterval(t); finishCashOut(); }
    }, 45);
  }
  function finishCashOut() {
    S.credits = 0;
    updateMeters(); refreshControls(); save();
    setMessage("INSERT COIN &nbsp;•&nbsp; PRESS DEAL", "blink");
  }

  function insertCoin() {
    S.credits += INSERT_AMOUNT;
    sfx.coin();
    setMessage("GOOD LUCK!", "blink");
    updateMeters(); refreshControls(); save();
  }

  function toggleMute() {
    S.muted = !S.muted;
    el.muteBtn.textContent = S.muted ? "🔇" : "🔊";
    if (!S.muted) sfx.hold();
    save();
  }

  // --- Wiring -----------------------------------------------------------
  function bind() {
    el.betBtn.addEventListener("click", () => setBet(S.bet >= 5 ? 1 : S.bet + 1));
    el.maxBtn.addEventListener("click", () => { if (S.phase === "ready" && S.credits >= 1) { S.bet = Math.min(5, S.credits); highlightPaytable(); updateMeters(); deal(); } });
    el.dealBtn.addEventListener("click", deal);
    el.cashBtn.addEventListener("click", cashOut);
    el.takeBtn.addEventListener("click", takeWin);
    el.doubleBtn.addEventListener("click", startDouble);
    el.muteBtn.addEventListener("click", toggleMute);

    el.hand.addEventListener("click", (e) => {
      const card = e.target.closest(".card");
      if (!card) return;
      const i = +card.dataset.i;
      if (S.phase === "dealt") toggleHold(i);
      else if (S.phase === "double") pickDouble(i);
    });

    document.addEventListener("keydown", (e) => {
      if (e.repeat) return;
      const k = e.key.toLowerCase();
      if (k >= "1" && k <= "5") {
        const i = +k - 1;
        if (S.phase === "dealt") toggleHold(i);
        else if (S.phase === "double") pickDouble(i + 1 <= 4 ? i + 1 : -1);
      } else if (k === "enter" || k === " ") {
        e.preventDefault();
        if (S.phase === "ready") deal();
        else if (S.phase === "dealt") draw();
        else if (S.phase === "result") takeWin();
      } else if (k === "d") {
        if (S.phase === "result") startDouble();
      } else if (k === "m") {
        toggleMute();
      }
    });
  }

  // --- Boot -------------------------------------------------------------
  function init() {
    el.ver.textContent = VERSION;
    load();
    buildPaytable();
    buildHand();
    highlightPaytable();
    updateMeters();
    el.muteBtn.textContent = S.muted ? "🔇" : "🔊";
    if (S.credits < 1) setMessage("INSERT COIN &nbsp;•&nbsp; PRESS DEAL", "blink");
    else setMessage("PRESS DEAL TO PLAY", "blink");
    refreshControls();
    bind();
  }

  init();
})();
</script>
</body>
</html>
